<style>

/* FUNDO MAIS ELEGANTE (VIBE NOSTÁLGICA) */
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: radial-gradient(circle at top, #1a1a2e, #0f3460, #000000);
}

/* CONTAINER */
.container {
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* PERFIL */
.profile img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 4px solid white;
  margin-top: 30px;
}

/* TEXTO */
h1 {
  font-size: 38px;
}

p {
  max-width: 520px;
  margin: auto;
}

/* BOTÕES EM GRID (não lista) */
.links {
  display: grid;
  grid-template-columns: repeat(2, 150px);
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
}

.links a {
  background: rgba(255,255,255,0.1);
  padding: 12px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  transition: 0.3s;
}

.links a:hover {
  background: rgba(255,255,255,0.3);
}

/* PLAYER */
.player {
  margin-top: 30px;
}

/* GALERIA 5x5 */
.gallery {
  margin-top: 50px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  padding: 20px;
}

.grid img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 10px;
}

/* WHATS */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  padding: 15px;
  border-radius: 50%;
  color: white;
  text-decoration: none;
}

</style>
</head>
