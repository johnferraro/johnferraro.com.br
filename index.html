/* FUNDO ANIMADO SUAVE */
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: linear-gradient(-45deg, #ff0080, #7928ca, #00c9ff, #92fe9d);
  background-size: 400% 400%;
  animation: gradient 12s ease infinite;
}

@keyframes gradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ENTRADA SUAVE */
.container {
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* PERFIL */
.profile img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 4px solid white;
  margin-top: 30px;
  box-shadow: 0 0 20px rgba(255,255,255,0.6);
}

/* NOME */
h1 {
  font-size: 38px;
  margin-bottom: 10px;
}

/* TEXTO */
p {
  max-width: 520px;
  margin: auto;
  font-size: 16px;
  line-height: 1.5;
}

/* LINKS */
.links a {
  display: block;
  background: rgba(255,255,255,0.15);
  margin: 12px auto;
  padding: 14px;
  border-radius: 14px;
  width: 270px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  backdrop-filter: blur(6px);
  transition: 0.3s;
}

.links a:hover {
  background: rgba(255,255,255,0.35);
  transform: scale(1.05);
}

/* GALERIA */
.gallery {
  margin-top: 50px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}

.grid img {
  width: 100%;
  height: 220px;
  object-fit: contain;
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  padding: 6px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  transition: 0.3s;
  cursor: pointer;
}

.grid img:hover {
  transform: scale(1.05);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  padding-top: 40px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
}

.modal img {
  max-width: 90%;
  max-height: 85%;
}

.modal:target {
  display: block;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  color: white;
  padding: 15px 18px;
  border-radius: 50%;
  font-size: 20px;
  text-decoration: none;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

</style>
