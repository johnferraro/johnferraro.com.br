<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>John Ferraro</title>

<style>

/* 🌆 FUNDO SKYLINE */
body {
  margin: 0;
  font-family: Arial;
  color: white;

  background: url("https://images.unsplash.com/photo-1477959858617-67f85cf4f1df");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  top: 0;
  left: 0;
  z-index: -1;
}

/* MENU */
.menu {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  backdrop-filter: blur(6px);
  z-index: 1000;
}

.menu a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: 100px auto 0;
  padding: 20px;
}

/* TOPO */
.topo {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
}

/* PERFIL */
.profile {
  display: flex;
  align-items: center;
  gap: 20px;
}

.profile img {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 3px solid white;
}

.profile-text {
  max-width: 400px;
}

/* PLAYER */
.player iframe {
  border-radius: 12px;
}

/* BOTÕES BONITOS */
.links {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 30px;
  justify-content: center;
}

.links a {
  padding: 12px 16px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

/* CORES POR REDE */
.links a:nth-child(1) { background: #25d366; } /* Whats */
.links a:nth-child(2) { background: #444; }    /* Email */
.links a:nth-child(3) { background: #e1306c; } /* Insta */
.links a:nth-child(4) { background: #000; }    /* TikTok */
.links a:nth-child(5) { background: #1877f2; } /* Facebook */
.links a:nth-child(6) { background: #0a66c2; } /* LinkedIn */

/* HOVER */
.links a:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 6px 20px rgba(0,0,0,0.6);
}

/* GALERIA */
.gallery {
  margin-top: 50px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}

.grid img {
  width: 100%;
  height: 180px;
  object-fit: contain;
  background: rgba(0,0,0,0.5);
  border-radius: 10px;
}

/* RESPONSIVO */
@media (max-width: 900px) {
  .topo {
    flex-direction: column;
    text-align: center;
  }

  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <a href="#">Início</a>
  <a href="viagens.html">Viagens</a>
  <a href="projetos.html">Projetos</a>
</div>

<div class="container">

<!-- TOPO -->
<div class="topo">

  <div class="profile">
    <img src="foto11.jpg">
    <div class="profile-text">
      <h1>John Ferraro</h1>
      <p>
        Professor e jornalista movido por histórias, conexões e novas experiências.
      </p>
    </div>
  </div>

  <div class="player">
    <iframe style="border-radius:12px" 
      src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M" 
      width="300" height="80"
      allow="autoplay; clipboard-write; encrypted-media;">
    </iframe>
  </div>

</div>

<!-- CONTATOS -->
<div class="links">
  <a href="https://wa.me/5511996444050" target="_blank" rel="noopener noreferrer">WhatsApp</a>
  <a href="mailto:john@johnferraro.com.br" target="_blank" rel="noopener noreferrer">E-mail</a>
  <a href="https://instagram.com/_johnferraro" target="_blank" rel="noopener noreferrer">Instagram</a>
  <a href="https://tiktok.com/@ferrarojohn" target="_blank" rel="noopener noreferrer">TikTok</a>
  <a href="https://facebook.com/ferraro.alan" target="_blank" rel="noopener noreferrer">Facebook</a>
  <a href="https://linkedin.com/in/johnferraro" target="_blank" rel="noopener noreferrer">LinkedIn</a>
</div>

<!-- GALERIA -->
<div class="gallery">
  <h2>Minha vida</h2>

  <div class="grid">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
    <img src="foto4.jpg">
    <img src="foto5.jpg">
    <img src="foto6.jpg">
    <img src="foto7.jpg">
    <img src="foto8.jpg">
    <img src="foto9.jpg">

  </div>
</div>

  <p>👀 Visitas: <span id="contador">...</span></p>

<script>
fetch('https://api.countapi.xyz/hit/johnferraro.com.br/visitas')

  });
</script>
  
</div>

</body>
</html>
