/* FUNDO ANIMADO */
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: linear-gradient(-45deg, #ff0080, #7928ca, #00ffcc, #ffcc00);
  background-size: 400% 400%;
  animation: gradient 10s ease infinite;
}

@keyframes gradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* PERFIL */
.profile img {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 4px solid white;
  margin-top: 30px;
}

/* TEXTO */
h1 {
  font-size: 34px;
}

p {
  max-width: 500px;
  margin: auto;
}

/* LINKS */
.links a {
  display: block;
  background: rgba(255,255,255,0.2);
  margin: 10px auto;
  padding: 12px;
  border-radius: 12px;
  width: 260px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  transition: 0.3s;
}

.links a:hover {
  background: rgba(255,255,255,0.4);
  transform: scale(1.05);
}

/* GALERIA */
.gallery {
  margin-top: 40px;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.grid img {
  width: 260px;
  height: 260px;
  object-fit: contain;
  background: rgba(255,255,255,0.1);
  margin: 10px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.grid img:hover {
  transform: scale(1.05);
}

/* MODAL (ABRIR FOTO GRANDE) */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  padding-top: 50px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
}

.modal img {
  max-width: 90%;
  max-height: 80%;
}

.modal:target {
  display: block;
}

/* BOTÃO WHATS */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  color: white;
  padding: 15px 18px;
  border-radius: 50%;
  font-size: 20px;
  text-decoration: none;
}

</style>
