<!DOCTYPE html>

<style>

/* FUNDO COM IMAGEM + FILTRO */
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

body::before {
  content: "";
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index:-1;
}

/* CONTAINER */
.container {
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* PERFIL */
.profile img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 4px solid white;
  margin-top: 30px;
  box-shadow: 0 0 20px rgba(255,255,255,0.6);
}

/* TEXTO */
h1 {
  font-size: 38px;
  margin-bottom: 10px;
}

p {
  max-width: 520px;
  margin: auto;
  line-height: 1.5;
}

/* LINKS */
.links a {
  display: block;
  background: rgba(255,255,255,0.15);
  margin: 12px auto;
  padding: 14px;
  border-radius: 14px;
  width: 270px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  backdrop-filter: blur(6px);
  transition: 0.3s;
}

.links a:hover {
  background: rgba(255,255,255,0.35);
  transform: scale(1.05);
}

/* PLAYER BONITO */
.player {
  margin-top: 30px;
}

audio {
  width: 250px;
  border-radius: 10px;
}

/* GALERIA */
.gallery {
  margin-top: 50px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}

.grid img {
  width: 100%;
  height: 220px;
  object-fit: contain;
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  padding: 6px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.grid img:hover {
  transform: scale(1.05);
}

/* WHATS */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  color: white;
  padding: 15px 18px;
  border-radius: 50%;
  font-size: 20px;
  text-decoration: none;
}

</style>
